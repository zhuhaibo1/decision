<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('MPD手册')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="mpd-form">
                    <div class="select-list">
                        <ul>
                            <li>JC_ID：<input type="text" name="jcId"/></li>
                            <li>APPL：<input type="text" name="appl"/></li>
                            <li>JCTITLEC：<input type="text" name="jctitlec"/></li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()"><i class="fa fa-plus"></i> 新增</a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()"><i class="fa fa-edit"></i> 修改</a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()"><i class="fa fa-remove"></i> 删除</a>
                <a class="btn btn-info" onclick="$.table.importExcel()"><i class="fa fa-upload"></i> 导入</a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()"><i class="fa fa-download"></i> 导出</a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "fleet/flightplan/mpd";
        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                importUrl: prefix + "/import",
                modalName: "MPD手册",
                columns: [
                    {checkbox: true},
                    {field: 'id', title: 'ID', visible: false},
                    {field: 'jcId', title: 'JC_ID'},
                    {field: 'threshold', title: 'THRESHOLD'},
                    {field: 'interval', title: 'INTERVAL'},
                    {field: 'jobcardTiOpInt', title: 'JOBCARD.T/I_OP_INT'},
                    {field: 'appl', title: 'APPL'},
                    {field: 'remark', title: 'REMARK'},
                    {field: 'jctitlec', title: 'JCTITLEC'}
                ]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
